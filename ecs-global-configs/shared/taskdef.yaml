family: <+serviceVariables.service_name>
networkMode: awsvpc
requiresCompatibilities:
  - FARGATE
cpu: <+serviceVariables.cpu>
memory: <+serviceVariables.memory>
executionRoleArn: <+serviceVariables.execution_role_arn>
taskRoleArn: <+serviceVariables.task_role_arn>

containerDefinitions:
  - name: <+serviceVariables.service_name>
    image: <+artifacts.primary.image>
    essential: true
    portMappings:
      - containerPort: <+serviceVariables.container_port>
        protocol: tcp
    healthCheck:
      command:
        - CMD-SHELL
        - >-
          wget --no-verbose --tries=1 --spider
          http://localhost:<+serviceVariables.container_port><+serviceVariables.health_check_path>
          || exit 1
      interval: 30
      timeout: 5
      retries: 3
      startPeriod: 60
    logConfiguration:
      logDriver: awslogs
      options:
        awslogs-group: /ecs/<+serviceVariables.service_name>
        awslogs-region: eu-west-2
        awslogs-stream-prefix: ecs
        awslogs-create-group: "true"