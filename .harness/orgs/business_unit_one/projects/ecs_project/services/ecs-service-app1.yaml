service:
  name: ecs-app1-service
  identifier: ecs_app1_service
  orgIdentifier: business_unit_one
  projectIdentifier: ecs_project
  serviceDefinition:
    type: ECS
    spec:
      variables:
        - name: service_name
          type: String
          required: true
          value: app1
        - name: cpu
          type: String
          value: "512"
        - name: memory
          type: String
          value: "1024"
        - name: desired_count
          type: String
          value: "1"
        - name: min_capacity
          type: String
          value: "1"
        - name: max_capacity
          type: String
          value: "4"
        - name: health_check_grace_period
          type: String
          value: "120"
        - name: container_port
          type: String
          value: "8080"
        - name: health_check_path
          type: String
          value: /actuator/health
        - name: subnet_1
          type: String
          value: ""
        - name: subnet_2
          type: String
          value: ""
        - name: security_group
          type: String
          value: ""
        - name: assign_public_ip
          type: String
          value: ""
        - name: execution_role_arn
          type: String
          value: ""
        - name: task_role_arn
          type: String
          value: ""
        - name: ecr_registry_id
          type: String
          value: ""
        - name: target_group_arn
          type: String
          value: ""
        - name: funValue1
          type: String
          description: ""
          required: false
          value: <+pipeline.stages.provision_alb.spec.execution.steps.apply.output.outputVariables.prod_subnet_1>
        - name: funValue2
          type: String
          description: ""
          required: false
          value: <+workspace.ECSALBDev.prod_subnet_1>
      manifests:
        - manifest:
            identifier: taskDefinition
            type: EcsTaskDefinition
            spec:
              store:
                type: Github
                spec:
                  connectorRef: org.ecs_git_connector
                  gitFetchType: Branch
                  repoName: ecs-example
                  branch: main
                  paths:
                    - ecs-global-configs/shared/taskdef.yaml
        - manifest:
            identifier: serviceDefinition
            type: EcsServiceDefinition
            spec:
              store:
                type: Github
                spec:
                  connectorRef: org.ecs_git_connector
                  gitFetchType: Branch
                  repoName: ecs-example
                  branch: main
                  paths:
                    - ecs-global-configs/shared/servicedef-rolling.yaml
        - manifest:
            identifier: scalableTarget
            type: EcsScalableTargetDefinition
            spec:
              store:
                type: Github
                spec:
                  connectorRef: org.ecs_git_connector
                  gitFetchType: Branch
                  repoName: ecs-example
                  branch: main
                  paths:
                    - ecs-global-configs/shared/scalable-target.yaml
        - manifest:
            identifier: scalingPolicy
            type: EcsScalingPolicyDefinition
            spec:
              store:
                type: Github
                spec:
                  connectorRef: org.ecs_git_connector
                  gitFetchType: Branch
                  repoName: ecs-example
                  branch: main
                  paths:
                    - ecs-global-configs/shared/scaling-policy.yaml
      artifacts:
        primary:
          primaryArtifactRef: ecr_image
          sources:
            - identifier: ecr_image
              type: Ecr
              spec:
                connectorRef: ecs_connector
                imagePath: app1
                tag: <+input>
                region: eu-west-2
                registryId: <+serviceVariables.ecr_registry_id>
